<h2>New Maintenance Request</h2>

<div class="button-container">
  <a routerLink="/maintenance/ticket-list">
    <button type="button">View Tickets</button>
  </a>
</div>

<div class="maintenance-form-container">

  <form (ngSubmit)="submitRequest(maintenanceForm)" #maintenanceForm="ngForm">

    <div class="form-group">
      <label for="maintenance-description">Description</label>
      <textarea
        id="maintenance-description"
        name="description"
        placeholder="Describe the maintenance issue"
        [(ngModel)]="newRequest.description"
        required
        #description="ngModel"
        class="form-control">
      </textarea>

      <small *ngIf="description.invalid && description.touched" class="error">
        Description is required
      </small>
    </div>

     <div class="form-group">
      <label for="maintenance-location">Issue Location</label>
      <select
      id="maintenance-location"
      title="Select The Location of The Issue"
      name="location"
      [(ngModel)]="newRequest.location"
      required
      class="form-control">

      <option value="">Select Location</option>
      <option value="Common Area">Common Area</option>
      <option value="Bedroom">Bedroom</option>
      <option value="Bathroom">Bathroom</option>
      <option value="Kitchen">Kitchen</option>
      </select>
    </div>

    <div class="form-group">
      <label for="maintenance-type">Category</label>
      <select
        id="maintenance-type"
        title="Select maintenance type"
        name="category"
        [(ngModel)]="newRequest.category"
        required
        class="form-control">

        <option value="">Select Category</option>
        <option value="Plumbing">Plumbing</option>
        <option value="Electrical">Electrical</option>
        <option value="HVAC">HVAC</option>
        <option value="General">General</option>
        <option value="Other">Other</option>
      </select>
    </div>

   


    <div class="form-group">
      <label for="maintenance-priority">Priority</label>
      <select
        id="maintenance-priority"
        name="priority"
        [(ngModel)]="newRequest.priority"
        class="form-control">

        <option value="">Select Priority</option>
        <option value="Low">Low</option>
        <option value="Medium" selected>Medium</option>
        <option value="High">High</option>
      </select>
    </div>


    <div class="form-group checkbox">
      <label>
        <input
          type="checkbox"
          name="emergency"
          [(ngModel)]="newRequest.emergency" />
        Mark as Emergency
      </label>
    </div>


    <div class="button-container">
      <button type="submit" [disabled]="maintenanceForm.invalid">
        Submit Request
      </button>
    </div>

  </form>

</div>
